    <style>
     /**css loader**/
      .loader {
        text-align: center;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(79, 79, 79, 0.5);
        z-index: 9999;
        display: none;
      }
      .loader.show {
        display: block;
      }
      .loader_show {
        max-width: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        left: 0;
        right: 0;
        margin: 0 auto;
        top: 0;
        bottom: 0;
      }
      .loader-view {
        color: #ffffff;
        position: relative;
        font-size: 11px !important;
        background: #ffffff;
        animation: escaleY 1s infinite ease-in-out;
        width: 1.4em;
        height: 6em;
        animation-delay: -0.16s;
      }
      .loader-view:before,
      .loader-view:after {
        content: "";
        position: absolute;
        top: 0;
        left: 2.6em;
        background: #ffffff;
        width: 1.4em;
        height: 6em;
        animation: escaleY 1s infinite ease-in-out;
      }
      .loader-view:before {
        left: -2.6em;
        animation-delay: -0.32s;
      }
      @keyframes escaleY {
        0%,
        80%,
        100% {
          box-shadow: 0 0;
          height: 6em;
          background: #0066be;
          color: #0066be;
        }
        40% {
          box-shadow: 0 -2em;
          height: 7.8em;
          background: #ffffff;
          color: #ffffff;
        }
      } 
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div class="loader show" id="custom_loader">
        <div class="loader_show">
          <span class="loader-view"> </span>
        </div>
    </div>
    <div id="root"></div>

  <script type="module" src="/src/index.jsx"></script>
  <script type="application/javascript">
    if (/MSIE|Trident/.test(window.navigator.userAgent)){
      alert("We're sorry, but this website does not support Internet Explorer. Please use a modern browser.")
    }

    const getCurrentUrl = window.location.href;
    if(getCurrentUrl.includes('ISTH2025')){
      document.getElementById("custom_loader").classList.remove("show");
    }
</script>
